<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1e40af"/>
  
  <!-- Document/Legal briefcase icon -->
  <g transform="translate(6, 6)">
    <!-- Briefcase body -->
    <rect x="1" y="3" width="18" height="14" rx="1" fill="white" stroke="white" stroke-width="0.5"/>
    
    <!-- Briefcase handle -->
    <path d="M 4 3 Q 10 0 16 3" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    
    <!-- Document lines inside -->
    <line x1="4" y1="6" x2="14" y2="6" stroke="#1e40af" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="4" y1="9" x2="14" y2="9" stroke="#1e40af" stroke-width="0.8" stroke-linecap="round"/>
    <line x1="4" y1="12" x2="12" y2="12" stroke="#1e40af" stroke-width="0.8" stroke-linecap="round"/>
  </g>
</svg>
